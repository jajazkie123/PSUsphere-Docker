{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Programs</h4>
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            {% if object %} Update Program Details {% else %} Add New Program {% endif %}
                        </div>
                        <div class="card-category">Fill out the information below</div>
                    </div>

                    <div class="col-md-6">
                        <div class="card-body">
                            <form action="" method="post" novalidate>
                                {% csrf_token %}
                                {% include 'includes/form.html' %}

                                <div class="form-group">
                                    <div class="col-md-12 col-sm-3">
                                        <button type="submit" class="btn btn-primary btn-rounded">Save Program</button>
                                        <a href="{% url 'program_list' %}" class="btn btn-secondary btn-rounded">Back to List</a>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
